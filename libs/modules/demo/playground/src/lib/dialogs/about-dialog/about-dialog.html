<aum-generic-dialog [showCloseButton]="true">
  <div dialog-header>
    <span>{{ 'ABOUT_TITLE' | translate }}</span>
  </div>

  <div dialog-body>
    <p class="dialog-message">{{ 'ABOUT_MESSAGE' | translate }}</p>
  </div>

  <div dialog-footer>
    <div class="dialog-actions">
      <aum-button
        [type]="'filled'"
        [value]="'CLOSE' | translate"
        (clickButton)="closeDialog()"
      ></aum-button>
    </div>
  </div>
</aum-generic-dialog>

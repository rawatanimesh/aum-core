<aum-page [pageInfo]="pageInfo">
  <div aum-page-body>
    <div class="detail-page">

      <ui-lab-component-header
        [name]="meta.name"
        [selector]="meta.selector"
        [importFrom]="meta.importFrom"
        [description]="meta.description"
        [status]="meta.status"
      ></ui-lab-component-header>

      <aum-tab-group>

        <aum-tab [label]="'UI_LAB_TAB_EXAMPLES' | translate">
          <demo-spinner-examples></demo-spinner-examples>
        </aum-tab>

        <aum-tab [label]="'UI_LAB_TAB_CODE' | translate">
          <div class="detail-page__code-section">
            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_IMPORT' | translate }}</h3>
            <ui-lab-code-block [code]="examples.importPath" language="typescript"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_BASIC_USAGE' | translate }}</h3>
            <ui-lab-code-block [code]="examples.basicUsage" language="html"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_DETERMINATE' | translate }}</h3>
            <ui-lab-code-block [code]="examples.determinateExample" language="typescript"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_WITH_TEXT' | translate }}</h3>
            <ui-lab-code-block [code]="examples.withText" language="html"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_TEXT_POSITION' | translate }}</h3>
            <ui-lab-code-block [code]="examples.withText" language="html"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_SIZES' | translate }}</h3>
            <ui-lab-code-block [code]="examples.basicUsage" language="html"></ui-lab-code-block>
          </div>
        </aum-tab>

        <aum-tab [label]="'UI_LAB_TAB_API' | translate">
          <ui-lab-api-table
            [inputs]="inputs"
            [outputs]="[]"
            [interfaces]="interfaces"
          ></ui-lab-api-table>
        </aum-tab>

      </aum-tab-group>

      <div class="detail-page__nav">
        <a class="detail-page__nav-prev" [routerLink]="'/ui-lab/utilities/icon'">
          <aum-icon name="arrow_back" color="primary" [width]="18"></aum-icon>
          <span>{{ 'UI_LAB_ICON' | translate }}</span>
        </a>
        <div></div>
      </div>

    </div>
  </div>
</aum-page>

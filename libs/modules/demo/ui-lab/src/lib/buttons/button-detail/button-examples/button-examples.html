<div class="button-examples">

  <!-- Scenario 1: Button Types -->
  <ui-lab-scenario-card
    [title]="'UI_LAB_SCENE_BTN_TYPES_TITLE' | translate"
    [description]="'UI_LAB_SCENE_BTN_TYPES_DESC' | translate"
  >
    <div class="demo-row">
      <div class="demo-item">
        <span class="item-label">Filled</span>
        <aum-button type="filled" value="Button" (clickButton)="onClick('filled')"></aum-button>
      </div>
      <div class="demo-item">
        <span class="item-label">Outlined</span>
        <aum-button type="outlined" value="Button" (clickButton)="onClick('outlined')"></aum-button>
      </div>
      <div class="demo-item">
        <span class="item-label">Basic</span>
        <aum-button type="basic" value="Button" (clickButton)="onClick('basic')"></aum-button>
      </div>
      <div class="demo-item">
        <span class="item-label">Icon</span>
        <aum-button type="icon" icon="more_vert" tooltip="More options" (clickButton)="onClick('icon')"></aum-button>
      </div>
    </div>
    @if (lastClicked()) {
      <p class="demo-output">Last clicked: <strong>{{ lastClicked() }}</strong></p>
    }
  </ui-lab-scenario-card>

  <!-- Scenario 2: Size Variants -->
  <ui-lab-scenario-card
    [title]="'UI_LAB_SCENE_BTN_SIZES_TITLE' | translate"
    [description]="'UI_LAB_SCENE_BTN_SIZES_DESC' | translate"
  >
    <div class="demo-column">
      <div class="demo-row">
        <span class="size-label">Large (default)</span>
        <aum-button type="filled" size="large" value="Filled"></aum-button>
        <aum-button type="outlined" size="large" value="Outlined"></aum-button>
        <aum-button type="basic" size="large" value="Basic"></aum-button>
      </div>
      <div class="demo-row">
        <span class="size-label">Small</span>
        <aum-button type="filled" size="small" value="Filled"></aum-button>
        <aum-button type="outlined" size="small" value="Outlined"></aum-button>
        <aum-button type="basic" size="small" value="Basic"></aum-button>
      </div>
    </div>
  </ui-lab-scenario-card>

  <!-- Scenario 3: Icon + Text -->
  <ui-lab-scenario-card
    [title]="'UI_LAB_SCENE_BTN_ICON_TEXT_TITLE' | translate"
    [description]="'UI_LAB_SCENE_BTN_ICON_TEXT_DESC' | translate"
  >
    <div class="demo-column">
      <div class="demo-row">
        <span class="size-label">Large (default)</span>
        <aum-button type="filled" icon="add" value="Add Item"></aum-button>
        <aum-button type="outlined" icon="add" value="Add Item"></aum-button>
        <aum-button type="basic" icon="add" value="Add Item"></aum-button>
      </div>
      <div class="demo-row">
        <span class="size-label">Small</span>
        <aum-button type="filled" size="small" icon="add" value="Add Item"></aum-button>
        <aum-button type="outlined" size="small" icon="add" value="Add Item"></aum-button>
        <aum-button type="basic" size="small" icon="add" value="Add Item"></aum-button>
      </div>
      <div class="demo-row">
        <span class="size-label">Other icons</span>
        <aum-button type="filled" icon="download" value="Export"></aum-button>
        <aum-button type="outlined" icon="upload" value="Import"></aum-button>
        <aum-button type="basic" icon="delete" value="Delete"></aum-button>
        <aum-button type="outlined" icon="edit" value="Edit"></aum-button>
      </div>
    </div>
  </ui-lab-scenario-card>

  <!-- Scenario 4: Disabled States -->
  <ui-lab-scenario-card
    [title]="'UI_LAB_SCENE_BTN_DISABLED_TITLE' | translate"
    [description]="'UI_LAB_SCENE_BTN_DISABLED_DESC' | translate"
  >
    <div class="demo-column">
      <div class="demo-row">
        <span class="size-label">Text only</span>
        <aum-button type="filled" value="Filled" [disabled]="true"></aum-button>
        <aum-button type="outlined" value="Outlined" [disabled]="true"></aum-button>
        <aum-button type="basic" value="Basic" [disabled]="true"></aum-button>
        <aum-button type="icon" icon="more_vert" [disabled]="true" tooltip="Disabled"></aum-button>
      </div>
      <div class="demo-row">
        <span class="size-label">Icon + text</span>
        <aum-button type="filled" icon="add" value="Add Item" [disabled]="true"></aum-button>
        <aum-button type="outlined" icon="add" value="Add Item" [disabled]="true"></aum-button>
        <aum-button type="basic" icon="add" value="Add Item" [disabled]="true"></aum-button>
      </div>
    </div>
  </ui-lab-scenario-card>

  <!-- Scenario 5: Tooltip -->
  <ui-lab-scenario-card
    [title]="'UI_LAB_SCENE_BTN_TOOLTIP_TITLE' | translate"
    [description]="'UI_LAB_SCENE_BTN_TOOLTIP_DESC' | translate"
  >
    <div class="demo-row">
      <aum-button type="icon" icon="settings" tooltip="Settings"></aum-button>
      <aum-button type="icon" icon="notifications" tooltip="Notifications"></aum-button>
      <aum-button type="icon" icon="help_outline" tooltip="Help & documentation"></aum-button>
      <aum-button type="outlined" value="Hover me" tooltip="Tooltip on a text button too"></aum-button>
    </div>
  </ui-lab-scenario-card>

  <!-- Scenario 6: Custom Width -->
  <ui-lab-scenario-card
    [title]="'UI_LAB_SCENE_BTN_WIDTH_TITLE' | translate"
    [description]="'UI_LAB_SCENE_BTN_WIDTH_DESC' | translate"
  >
    <div class="demo-column">
      <aum-button type="filled" value="Full-width (100%)" width="100%"></aum-button>
      <aum-button type="outlined" value="Fixed 20rem" width="20rem"></aum-button>
      <aum-button type="filled" icon="save" value="Save Changes" width="16rem"></aum-button>
    </div>
  </ui-lab-scenario-card>

</div>

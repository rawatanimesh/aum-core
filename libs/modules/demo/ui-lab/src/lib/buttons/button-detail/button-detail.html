<aum-page [pageInfo]="pageInfo">
  <div aum-page-body>
    <div class="detail-page">

      <ui-lab-component-header
        [name]="meta.name"
        [selector]="meta.selector"
        [importFrom]="meta.importFrom"
        [description]="meta.description"
        [status]="meta.status"
      ></ui-lab-component-header>

      <aum-tab-group>

        <aum-tab [label]="'UI_LAB_TAB_EXAMPLES' | translate">
          <ui-lab-button-examples></ui-lab-button-examples>
        </aum-tab>

        <aum-tab [label]="'UI_LAB_TAB_CODE' | translate">
          <div class="detail-page__code-section">
            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_BASIC_USAGE' | translate }}</h3>
            <ui-lab-code-block [code]="examples.basicUsage" language="typescript"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_WITH_ICON' | translate }}</h3>
            <ui-lab-code-block [code]="examples.withIcon" language="html"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_SIZE_VARIANTS' | translate }}</h3>
            <ui-lab-code-block [code]="examples.sizeVariants" language="html"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_CLICK_HANDLER' | translate }}</h3>
            <ui-lab-code-block [code]="examples.clickHandler" language="typescript"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_CUSTOM_WIDTH' | translate }}</h3>
            <ui-lab-code-block [code]="examples.customWidth" language="html"></ui-lab-code-block>
          </div>
        </aum-tab>

        <aum-tab [label]="'UI_LAB_TAB_API' | translate">
          <ui-lab-api-table
            [inputs]="inputs"
            [outputs]="outputs"
          ></ui-lab-api-table>
        </aum-tab>

      </aum-tab-group>

      <div class="detail-page__nav">
        <div></div>
        <a class="detail-page__nav-next" [routerLink]="'/ui-lab/buttons/button-toggle'">
          <span>{{ 'UI_LAB_BUTTON_TOGGLE' | translate }}</span>
          <aum-icon name="arrow_forward" color="primary" [width]="18"></aum-icon>
        </a>
      </div>

    </div>
  </div>
</aum-page>

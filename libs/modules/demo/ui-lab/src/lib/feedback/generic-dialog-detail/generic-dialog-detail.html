<aum-page [pageInfo]="pageInfo">
  <div aum-page-body>
    <div class="detail-page">

      <ui-lab-component-header
        [name]="meta.name"
        [selector]="meta.selector"
        [importFrom]="meta.importFrom"
        [description]="meta.description"
        [status]="meta.status"
      ></ui-lab-component-header>

      <aum-tab-group>

        <aum-tab [label]="'UI_LAB_TAB_EXAMPLES' | translate">
          <demo-generic-dialog-examples></demo-generic-dialog-examples>
        </aum-tab>

        <aum-tab [label]="'UI_LAB_TAB_CODE' | translate">
          <div class="detail-page__code-section">
            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_IMPORT' | translate }}</h3>
            <ui-lab-code-block [code]="examples.importPath" language="typescript"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_OPEN_DIALOG' | translate }}</h3>
            <ui-lab-code-block [code]="examples.basicUsage" language="typescript"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_NO_CLOSE_BTN' | translate }}</h3>
            <ui-lab-code-block [code]="examples.noCloseButton" language="typescript"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_BODY_HEIGHT' | translate }}</h3>
            <ui-lab-code-block [code]="examples.bodyHeightExample" language="typescript"></ui-lab-code-block>
          </div>
        </aum-tab>

        <aum-tab [label]="'UI_LAB_TAB_API' | translate">
          <ui-lab-api-table
            [inputs]="inputs"
            [interfaces]="interfaces"
          ></ui-lab-api-table>
        </aum-tab>

      </aum-tab-group>

      <div class="detail-page__nav">
        <a class="detail-page__nav-prev" [routerLink]="'/ui-lab/feedback/snackbar'">
          <aum-icon name="arrow_back" color="primary" [width]="18"></aum-icon>
          <span>{{ 'UI_LAB_SNACKBAR' | translate }}</span>
        </a>
        <a class="detail-page__nav-next" [routerLink]="'/ui-lab/feedback/confirmation-dialog'">
          <span>{{ 'UI_LAB_CONFIRMATION_DIALOG' | translate }}</span>
          <aum-icon name="arrow_forward" color="primary" [width]="18"></aum-icon>
        </a>
      </div>

    </div>
  </div>
</aum-page>

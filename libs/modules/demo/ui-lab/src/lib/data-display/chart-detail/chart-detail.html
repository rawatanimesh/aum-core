<aum-page [pageInfo]="pageInfo">
  <div aum-page-body>
    <div class="detail-page">

      <ui-lab-component-header
        [name]="meta.name"
        [selector]="meta.selector"
        [importFrom]="meta.importFrom"
        [description]="meta.description"
        [status]="meta.status"
      ></ui-lab-component-header>

      <aum-tab-group>

        <aum-tab [label]="'UI_LAB_TAB_EXAMPLES' | translate">
          <demo-chart-examples></demo-chart-examples>
        </aum-tab>

        <aum-tab [label]="'UI_LAB_TAB_CODE' | translate">
          <div class="detail-page__code-section">
            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_IMPORT' | translate }}</h3>
            <ui-lab-code-block [code]="examples.importPath" language="typescript"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_BAR_CHART' | translate }}</h3>
            <ui-lab-code-block [code]="examples.barChart" language="typescript"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_LINE_CHART' | translate }}</h3>
            <ui-lab-code-block [code]="examples.lineChart" language="typescript"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_DOUGHNUT_CHART' | translate }}</h3>
            <ui-lab-code-block [code]="examples.doughnutChart" language="typescript"></ui-lab-code-block>

            <h3 class="detail-page__code-title">{{ 'UI_LAB_CODE_CUSTOM_CHART_SIZE' | translate }}</h3>
            <ui-lab-code-block [code]="examples.customSize" language="typescript"></ui-lab-code-block>
          </div>
        </aum-tab>

        <aum-tab [label]="'UI_LAB_TAB_API' | translate">
          <ui-lab-api-table [inputs]="inputs" [outputs]="outputs"></ui-lab-api-table>
        </aum-tab>

      </aum-tab-group>

      <div class="detail-page__nav">
        <div></div>
        <div></div>
      </div>

    </div>
  </div>
</aum-page>

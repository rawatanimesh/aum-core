<nav class="gs-toc" aria-label="Page sections">
  <span class="gs-toc-title fw-600 fs-12">{{ 'GS_ON_THIS_PAGE' | translate }}</span>
  <ul class="gs-toc-list">
    @for (section of sections; track section.id) {
      <li>
        <a
          class="gs-toc-link fs-14"
          [class.active]="section.id === activeId"
          [attr.aria-current]="section.id === activeId ? 'true' : null"
          [routerLink]="[]"
          [fragment]="section.id"
          (click)="scrollTo($event, section.id)"
        >
          {{ section.labelKey | translate }}
        </a>
      </li>
    }
  </ul>
</nav>

<div class="aum-button">
  @switch (type) { @case ('outlined') {
  <button
    matButton="outlined"
    [type]="htmlType"
    [attr.aria-label]="value"
    [disabled]="disabled"
    [matTooltip]="tooltip | translate"
    [ngClass]="sizeClass"
    [style.width]="width"
    (click)="clickButton.emit()"
  >
    {{ value | translate }}
  </button>
  } @case ('filled') {
  <button
    matButton="filled"
    [type]="htmlType"
    [attr.aria-label]="value"
    [disabled]="disabled"
    [matTooltip]="tooltip | translate"
    [ngClass]="sizeClass"
    [style.width]="width"
    (click)="clickButton.emit()"
  >
    {{ value | translate }}
  </button>
  } @case ('basic') {
  <button
    matButton
    [type]="htmlType"
    [attr.aria-label]="value"
    [disabled]="disabled"
    [matTooltip]="tooltip | translate"
    [ngClass]="sizeClass"
    [style.width]="width"
    (click)="clickButton.emit()"
  >
    {{ value | translate }}
  </button>
  } @case ('icon') {
  <button
    matIconButton
    [type]="htmlType"
    [attr.aria-label]="value"
    [disabled]="disabled"
    [matTooltip]="tooltip | translate"
    (click)="clickButton.emit()"
  >
    @if (icon) {
    <mat-icon>{{ icon }}</mat-icon>
    }
  </button>
  } }
</div>

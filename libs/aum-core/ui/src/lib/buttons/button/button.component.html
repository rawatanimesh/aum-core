<div class="aum-button">
  @switch (type) { @case ('outlined') {
  <button
    matButton="outlined"
    [type]="htmlType"
    [attr.aria-label]="value"
    [disabled]="disabled"
    [matTooltip]="tooltip"
    [ngClass]="sizeClass"
    [style.width]="width"
    (click)="clickButton.emit()"
  >
    @if (icon) { <aum-icon [name]="icon" [width]="18"></aum-icon> }
    {{ value }}
  </button>
  } @case ('filled') {
  <button
    matButton="filled"
    [type]="htmlType"
    [attr.aria-label]="value"
    [disabled]="disabled"
    [matTooltip]="tooltip"
    [ngClass]="sizeClass"
    [style.width]="width"
    (click)="clickButton.emit()"
  >
    @if (icon) { <aum-icon [name]="icon" [width]="18"></aum-icon> }
    {{ value }}
  </button>
  } @case ('basic') {
  <button
    matButton
    [type]="htmlType"
    [attr.aria-label]="value"
    [disabled]="disabled"
    [matTooltip]="tooltip"
    [ngClass]="sizeClass"
    [style.width]="width"
    (click)="clickButton.emit()"
  >
    @if (icon) { <aum-icon [name]="icon" [width]="18"></aum-icon> }
    {{ value }}
  </button>
  } @case ('icon') {
  <button
    matIconButton
    [type]="htmlType"
    [attr.aria-label]="value"
    [disabled]="disabled"
    [matTooltip]="tooltip"
    (click)="clickButton.emit()"
  >
    @if (icon) {
    <aum-icon [name]="icon"></aum-icon>
    }
  </button>
  } }
</div>

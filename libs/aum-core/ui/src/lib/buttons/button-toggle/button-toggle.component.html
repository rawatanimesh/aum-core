<div class="aum-button-toggle" [ngClass]="sizeClass" [class.aum-button-toggle--disabled]="disabled">
  <mat-button-toggle-group
    [value]="currentValue"
    [multiple]="multiple"
    [disabled]="disabled"
    [attr.aria-label]="ariaLabel || null"
    hideSingleSelectionIndicator
    hideMultipleSelectionIndicator
    (change)="onToggleChange($event.value)"
  >
    @for (option of options; track option.value) {
      <mat-button-toggle [value]="option.value">
        @if (option.icon) {
          <aum-icon [name]="option.icon" [width]="size === 'small' ? 14 : 16"></aum-icon>
        }
        {{ option.label }}
      </mat-button-toggle>
    }
  </mat-button-toggle-group>
</div>

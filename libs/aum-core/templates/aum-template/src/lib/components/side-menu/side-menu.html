<nav class="aum-side-nav" aria-label="left navigation">
  <ul>
    @for (item of items; track item.value) {
    <li
      class="aum-side-nav-item flex-row"
      [class.selected]="item.value === selected"
    >
      <a
        href="javascript:void(0)"
        (click)="onItemClick(item, $event)"
        [attr.aria-expanded]="item.expanded ?? false"
        class="aum-side-nav-item-link flex-row w-100"
      >
        <div class="flex-row-flex-start-center">
          <aum-icon class="aum-side-nav-item-link-icon" [name]="item.icon || 'radio_button_unchecked'"></aum-icon>
          <span class="aum-side-nav-item-link-label">{{ item.label | translate }}</span>
        </div>

        @if (item.children?.length) {
          <aum-icon class="aum-side-nav-item-link-expand-icon" [name]="item.expanded ? 'expand_less' : 'expand_more'"></aum-icon>
        }
      </a>
    </li>

    @if (item.children?.length && item.expanded) {
    <ul>
      @for (child of item.children; track child.value) {
      <li
        class="aum-side-nav-item child flex-row-flex-start"
        [class.selected]="child.value === selected"
      >
        <a
          href="javascript:void(0)"
          (click)="onItemClick(child, $event)"
          class="aum-side-nav-item-link flex-row-flex-start-center w-100"
        >
          <aum-icon class="aum-side-nav-item-link-icon" [name]="child.icon || 'circle'"></aum-icon>
          <span class="aum-side-nav-item-link-label">{{ child.label | translate }}</span>
        </a>
      </li>
      }
    </ul>
    } }
  </ul>
</nav>

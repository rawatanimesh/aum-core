<div class="aum-settings-drawer">

  <!-- Global actions -->
  @for (action of globalActions; track action.id) {
    <button class="aum-settings-drawer__item" (click)="onGlobalActionClick(action.id)">
      <mat-icon class="aum-settings-drawer__icon">{{ action.icon }}</mat-icon>
      <span class="aum-settings-drawer__label">{{ (action.tooltip || '') | translate }}</span>
    </button>
  }

  @if (globalActions.length) {
    <div class="aum-settings-drawer__divider"></div>
  }

  <!-- Preferences -->
  @if (shouldShowPreferencesMenu()) {
    <button
      class="aum-settings-drawer__item"
      [matMenuTriggerFor]="optionsMenu.childMenu"
      [disabled]="isPreferencesMenuDisabled()"
      (click)="onMenuOpening()"
    >
      <mat-icon class="aum-settings-drawer__icon">tune</mat-icon>
      <span class="aum-settings-drawer__label">{{ 'PREFERENCES' | translate }}</span>
      <mat-icon class="aum-settings-drawer__chevron">chevron_right</mat-icon>
    </button>
  }

  <!-- Profile -->
  @if (shouldShowProfileMenu()) {
    <button
      class="aum-settings-drawer__item"
      [matMenuTriggerFor]="profileMenu.childMenu"
      [disabled]="isProfileMenuDisabled()"
      (click)="onMenuOpening()"
    >
      <mat-icon class="aum-settings-drawer__icon">account_circle</mat-icon>
      <span class="aum-settings-drawer__label">{{ 'MY_ACCOUNT' | translate }}</span>
      <mat-icon class="aum-settings-drawer__chevron">chevron_right</mat-icon>
    </button>
  }

</div>

<aum-menu-list
  #optionsMenu="aumMenu"
  [list]="optionsMenuList"
  (itemSelected)="onMenuSelect($event)"
></aum-menu-list>

<aum-menu-list
  #profileMenu="aumMenu"
  [list]="profileMenuList"
  (itemSelected)="onMenuSelect($event)"
></aum-menu-list>

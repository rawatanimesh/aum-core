<div class="aum-settings-drawer">

  <!-- Global actions -->
  @for (action of globalActions; track action.id) {
    <button class="aum-settings-drawer__item" (click)="onGlobalActionClick(action.id)">
      <aum-icon class="aum-settings-drawer__icon" [name]="action.icon" [width]="24" color="on-surface-variant"></aum-icon>
      <span class="aum-settings-drawer__label">{{ (action.tooltip || '') | translate }}</span>
    </button>
  }

  @if (globalActions.length) {
    <div class="aum-settings-drawer__divider"></div>
  }

  <!-- Preferences -->
  @if (shouldShowPreferencesMenu()) {
    <button
      class="aum-settings-drawer__item"
      [disabled]="isPreferencesMenuDisabled()"
      (click)="openPreferences()"
    >
      <aum-icon class="aum-settings-drawer__icon" name="tune" [width]="24" color="on-surface-variant"></aum-icon>
      <span class="aum-settings-drawer__label">{{ 'AUM.PREFERENCES' | translate }}</span>
    </button>
  }

  <!-- Profile -->
  @if (shouldShowProfileMenu()) {
    <button
      class="aum-settings-drawer__item"
      [matMenuTriggerFor]="profileMenu.childMenu"
      [disabled]="isProfileMenuDisabled()"
      (click)="onMenuOpening()"
    >
      <aum-icon class="aum-settings-drawer__icon" name="account_circle" [width]="24" color="on-surface-variant"></aum-icon>
      <span class="aum-settings-drawer__label">{{ 'AUM.MY_ACCOUNT' | translate }}</span>
      <aum-icon class="aum-settings-drawer__chevron" name="chevron_right" [width]="20" color="on-surface-variant"></aum-icon>
    </button>
  }

</div>

<aum-menu-list
  #profileMenu="aumMenu"
  [list]="profileMenuList"
  (itemSelected)="onMenuSelect($event)"
></aum-menu-list>

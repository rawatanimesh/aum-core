<div class="aum-template-page">
  <div class="aum-template-page-header">
    <aum-toolbar
      (sideMenuToggle)="toggleSideNav()"
      (settingsDrawerToggle)="toggleSettingsDrawer()"
    ></aum-toolbar>
  </div>

  <div class="aum-template-page-body">
    <mat-sidenav-container
      class="aum-template-page-body-container"
      [hasBackdrop]="true"
    >
      <!-- Left Sidenav: navigation -->
      <mat-sidenav #sidenav class="navSide" mode="over">
        <aum-sidenav
          (menuItemClicked)="updateBreadCrumbs($event); toggleSideNav()"
        ></aum-sidenav>
      </mat-sidenav>

      <!-- Right Sidenav: settings drawer (mobile only) -->
      <mat-sidenav #settingsDrawer class="settingsSide" mode="over" position="end">
        <aum-settings-drawer></aum-settings-drawer>
      </mat-sidenav>

      <!-- Main Content -->
      <mat-sidenav-content>
        <router-outlet></router-outlet>
      </mat-sidenav-content>
    </mat-sidenav-container>
  </div>
</div>
